name: Dr.Excel CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - development

env:
  AWS_REGION: us-east-1
  FRONTEND_ECR: dr.excel-frontend
  BACKEND_ECR: dr.excel-backend
  ECS_CLUSTER: dr.excel-cluster
  FRONTEND_SERVICE: frontend-service
  BACKEND_SERVICE: backend-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      frontend_image: ${{ steps.meta.outputs.images[0].tags[0] }}
      backend_image: ${{ steps.meta.outputs.images[1].tags[0] }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker images
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}/${{ env.FRONTEND_ECR }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}/${{ env.BACKEND_ECR }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Create ECR repositories (if not exist)
        run: |
          aws ecr describe-repositories --repository-names ${{ env.FRONTEND_ECR }} || \
          aws ecr create-repository --repository-name ${{ env.FRONTEND_ECR }}
          aws ecr describe-repositories --repository-names ${{ env.BACKEND_ECR }} || \
          aws ecr create-repository --repository-name ${{ env.BACKEND_ECR }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.images[0].tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.images[1].tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.FRONTEND_SERVICE }} \
            --force-new-deployment

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.BACKEND_SERVICE }} \
            --force-new-deployment

      - name: Wait for services to stabilize
        run: |
          echo "Waiting for services to stabilize..."
          sleep 30

      - name: Check deployment health
        run: |
          FRONTEND_STATUS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.FRONTEND_SERVICE }} --query 'services[0].status' --output text)
          BACKEND_STATUS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.BACKEND_SERVICE }} --query 'services[0].status' --output text)
          echo "Frontend status: $FRONTEND_STATUS"
          echo "Backend status: $BACKEND_STATUS"